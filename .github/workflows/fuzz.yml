name: Fuzz Testing

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC
  workflow_dispatch:
  pull_request:
    paths:
      - 'modules/**'
      - 'lib/**'

jobs:
  fuzz-coverage:
    name: Check fuzz coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Check fuzz test coverage
        run: scripts/check-fuzz-coverage.sh

  fuzz:
    name: Fuzz ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: redis
            package: ./modules/redis/...
          - module: mysql
            package: ./lib/mysql/...
          - module: siemens
            package: ./modules/siemens/...
          - module: bacnet
            package: ./modules/bacnet/...
          - module: oracle
            package: ./modules/oracle/...
          - module: mongodb
            package: ./modules/mongodb/...
          - module: mqtt
            package: ./modules/mqtt/...
          - module: mssql
            package: ./modules/mssql/...
          - module: ntp
            package: ./modules/ntp/...
          - module: smb
            package: ./lib/smb/smb/encoder/...
          - module: enip
            package: ./modules/enip/...
          - module: codesys2
            package: ./modules/codesys2/...
          - module: memcached
            package: ./modules/memcached/...
          - module: ipp
            package: ./modules/ipp/...
          - module: rdp
            package: ./modules/rdp/...
          - module: postgres
            package: ./modules/postgres/...
          - module: dnp3
            package: ./modules/dnp3/...
          - module: modbus
            package: ./modules/modbus/...
          - module: socks5
            package: ./modules/socks5/...
          - module: telnet
            package: ./modules/telnet/...
          - module: ntlm
            package: ./lib/ntlm/...
          - module: pptp
            package: ./modules/pptp/...
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Read go version
        id: go_version
        run: |
          GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')
          echo "GO_VERSION=$GO_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go_version.outputs.GO_VERSION }}

      - name: Run fuzz tests
        run: |
          FUZZ_FUNCS=$(go test -list 'Fuzz.*' ${{ matrix.package }} 2>/dev/null | grep '^Fuzz' || true)
          for func in $FUZZ_FUNCS; do
            echo "=== Fuzzing $func ==="
            go test -fuzz="^${func}$" -fuzztime=60s ${{ matrix.package }}
          done
